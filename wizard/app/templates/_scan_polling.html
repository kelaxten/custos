<!-- HTMX polling fragment — shown while WS-Discovery scan is in progress -->
<div class="text-center py-12"
     hx-get="/setup/scan/poll"
     hx-trigger="every 2s"
     hx-swap="outerHTML">
  <div class="inline-flex items-center gap-3 text-slate-600">
    <svg class="animate-spin h-6 w-6 text-brand" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
    </svg>
    <span class="text-lg font-medium">Scanning your network for cameras…</span>
  </div>
  <p class="text-sm text-slate-400 mt-3">This usually takes about 5 seconds.</p>
</div>
