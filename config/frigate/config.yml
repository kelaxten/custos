# Frigate NVR Configuration — Custos
# Raspberry Pi 5 · Reolink cameras
#
# This file is pre-configured for common Reolink setups on Pi 5.
# Edit the `cameras` section to match your camera IPs and credentials.
# See docs/reolink-cameras.md for model-specific RTSP URLs.

# ─── MQTT ─────────────────────────────────────────────────────────────────────
# Frigate publishes all detection events here. Home Assistant subscribes to them.
mqtt:
  enabled: true
  host: 127.0.0.1
  port: 1883
  topic_prefix: frigate
  user: "{FRIGATE_MQTT_USER}"
  password: "{FRIGATE_MQTT_PASSWORD}"

# ─── Detectors ────────────────────────────────────────────────────────────────
# Pi 5 CPU detection works well for 2–3 cameras at sub-stream resolution.
# For better performance (and to keep your Pi cooler), add a Coral USB TPU and
# uncomment the edgetpu section below.
detectors:
  cpu:
    type: cpu
    num_threads: 3      # Pi 5 has 4 cores; leave 1 free for system tasks

# Coral USB TPU (optional but recommended — ~10x faster detection, much lower CPU):
# Plug in your Coral USB TPU, then replace the cpu section above with:
#
# detectors:
#   coral:
#     type: edgetpu
#     device: usb

# ─── FFmpeg ───────────────────────────────────────────────────────────────────
# Pi 5 hardware video decoder — reduces CPU load from decoding streams.
# preset-rpi-64 uses the Pi 5's V4L2 M2M hardware decoder.
ffmpeg:
  hwaccel_args: preset-rpi-64

# ─── Snapshots & Recording ────────────────────────────────────────────────────
# Default: save snapshots on every detection event, keep recordings 7 days.
snapshots:
  enabled: true
  bounding_box: true
  retain:
    default: 14           # keep detection snapshots for 14 days

record:
  enabled: true
  retain:
    days: 7               # keep continuous recordings for 7 days
    mode: motion          # only retain segments with motion (saves storage)
  events:
    retain:
      default: 14         # keep event clips for 14 days
      mode: active_objects

# ─── Objects ──────────────────────────────────────────────────────────────────
# What to detect. Start with person and car — very reliable. Others add false positives.
objects:
  track:
    - person
    - car
  filters:
    person:
      min_area: 5000        # ignore tiny blobs (bugs, leaves)
      max_area: 100000
      min_score: 0.5
      threshold: 0.7
    car:
      min_area: 10000
      threshold: 0.75

# ─── Cameras ──────────────────────────────────────────────────────────────────
# Add one entry per camera. See docs/reolink-cameras.md for exact RTSP URLs
# for your Reolink model. {FRIGATE_RTSP_PASSWORD} is read from your .env file.
#
# The pattern for most Reolink cameras:
#   Main stream (record):  rtsp://admin:{FRIGATE_RTSP_PASSWORD}@<IP>:554/h264Preview_01_main
#   Sub stream (detect):   rtsp://admin:{FRIGATE_RTSP_PASSWORD}@<IP>:554/h264Preview_01_sub

cameras:
  # ── Camera 1: Front Door ──────────────────────────────────────────────────
  front_door:
    enabled: true
    ffmpeg:
      inputs:
        # Sub-stream: lower res, used for AI detection (saves CPU)
        - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.1.101:554/h264Preview_01_sub
          roles:
            - detect
          input_args: preset-rtsp-restream   # Reolink needs TCP transport
        # Main stream: full res, used for recording
        - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.1.101:554/h264Preview_01_main
          roles:
            - record
          input_args: preset-rtsp-restream
    detect:
      width: 640
      height: 480
      fps: 5            # 5fps is plenty for detection; saves CPU
    snapshots:
      enabled: true
    record:
      enabled: true

  # ── Camera 2: Driveway ───────────────────────────────────────────────────
  driveway:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.1.102:554/h264Preview_01_sub
          roles:
            - detect
          input_args: preset-rtsp-restream
        - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.1.102:554/h264Preview_01_main
          roles:
            - record
          input_args: preset-rtsp-restream
    detect:
      width: 640
      height: 480
      fps: 5
    snapshots:
      enabled: true
    record:
      enabled: true

  # ── Camera 3: Backyard (add more cameras by copying this block) ───────────
  # backyard:
  #   enabled: true
  #   ffmpeg:
  #     inputs:
  #       - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.1.103:554/h264Preview_01_sub
  #         roles:
  #           - detect
  #         input_args: preset-rtsp-restream
  #       - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.1.103:554/h264Preview_01_main
