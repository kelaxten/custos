# Custos Lovelace dashboard — auto-generated by the setup wizard.
# Three views: Cameras (live snapshots + detection badges), Activity (event log),
# System (Frigate health + recording controls).
# To regenerate: visit http://custos.local/setup → Reconfigure Cameras.

title: Custos
views:

  # ── Cameras ────────────────────────────────────────────────────────────────
  # Default view: camera grid with live snapshots and detection state badges.
  # Tapping any camera opens its Frigate recordings page.
  - title: Cameras
    path: cameras
    icon: mdi:cctv
    type: masonry
    badges: []
    cards:

      # Quick-glance detection status across all cameras
      - type: glance
        show_name: true
        show_icon: true
        show_state: true
        entities:
          - entity: binary_sensor.front_door_person
            name: Front Door
            icon: mdi:walk
          - entity: binary_sensor.front_door_car
            name: Front Door
            icon: mdi:car
          - entity: binary_sensor.driveway_person
            name: Driveway
            icon: mdi:walk
          - entity: binary_sensor.driveway_car
            name: Driveway
            icon: mdi:car

      # Camera grid — 2 columns, each card auto-refreshes every 2 s
      - type: grid
        columns: 2
        square: false
        cards:

          - type: picture-glance
            title: Front Door
            camera_image: camera.front_door
            entities:
              - entity: binary_sensor.front_door_person
                icon: mdi:walk
              - entity: binary_sensor.front_door_car
                icon: mdi:car
            tap_action:
              action: url
              url_path: /frigate/cameras/front_door

          - type: picture-glance
            title: Driveway
            camera_image: camera.driveway
            entities:
              - entity: binary_sensor.driveway_person
                icon: mdi:walk
              - entity: binary_sensor.driveway_car
                icon: mdi:car
            tap_action:
              action: url
              url_path: /frigate/cameras/driveway

  # ── Activity ───────────────────────────────────────────────────────────────
  # Timeline of detection events for the last 24 hours + link to event clips.
  - title: Activity
    path: activity
    icon: mdi:bell-ring
    type: masonry
    badges: []
    cards:

      - type: logbook
        title: Detections — Last 24 Hours
        hours_to_show: 24
        entities:
          - binary_sensor.front_door_person
          - binary_sensor.front_door_car
          - binary_sensor.driveway_person
          - binary_sensor.driveway_car

      - type: button
        name: Browse Event Clips
        icon: mdi:video-box
        show_name: true
        tap_action:
          action: url
          url_path: /frigate/events

  # ── System ─────────────────────────────────────────────────────────────────
  # Frigate health metrics and per-camera recording toggles.
  - title: System
    path: system
    icon: mdi:server-outline
    type: masonry
    badges: []
    cards:

      # Frigate performance — entities auto-discovered via Frigate MQTT
      - type: entities
        title: Detection Engine
        entities:
          - entity: sensor.frigate_detection_fps
            name: Detection FPS
            icon: mdi:speedometer
          - entity: sensor.frigate_front_door_camera_fps
            name: Front Door FPS
          - entity: sensor.frigate_driveway_camera_fps
            name: Driveway FPS
          - type: weblink
            name: Open Frigate UI
            url: /frigate
            icon: mdi:open-in-new

      # Per-camera recording / detect / snapshot toggles (auto-discovered via Frigate MQTT)
      - type: entities
        title: Recording Controls
        entities:
          - entity: switch.frigate_front_door_recordings
            name: Front Door · Recording
          - entity: switch.frigate_front_door_detect
            name: Front Door · Detection
          - entity: switch.frigate_driveway_recordings
            name: Driveway · Recording
          - entity: switch.frigate_driveway_detect
            name: Driveway · Detection
