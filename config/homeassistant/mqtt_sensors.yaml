# MQTT binary sensors — auto-generated by the Custos setup wizard.
# Mirrors Frigate's per-camera object detection topics to HA binary sensors.
# Topic format: frigate/{camera}/{label}  →  payload "1" = detected, "0" = clear.

- name: "Front Door Person"
  unique_id: frigate_front_door_person
  state_topic: "frigate/front_door/person"
  payload_on: "1"
  payload_off: "0"
  device_class: motion
  off_delay: 30

- name: "Front Door Car"
  unique_id: frigate_front_door_car
