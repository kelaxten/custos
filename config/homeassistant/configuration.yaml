# Home Assistant configuration — Custos
# This file wires up HA as a notification router for Frigate detection events.
# Users interact with the HA Companion app on their phone, not with this file.

# ─── Core ─────────────────────────────────────────────────────────────────────
homeassistant:
  name: Custos
  unit_system: imperial
  time_zone: America/New_York   # Update to your timezone (see docs/raspberry-pi-setup.md)
  country: US

# Allow HA to be accessed through the Caddy reverse proxy
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - 172.16.0.0/12   # Docker bridge network range

# ─── Integrations ─────────────────────────────────────────────────────────────
frontend:
  themes: !include_dir_merge_named themes

# Lovelace in YAML mode — wizard generates ui-lovelace.yaml when cameras are configured.
lovelace:
  mode: yaml
  resources: []

default_config:

# ─── Cameras ──────────────────────────────────────────────────────────────────
# Generic camera entities that pull snapshots from the Frigate HTTP API.
# Wizard overwrites cameras.yaml when cameras are configured.
camera: !include cameras.yaml

# ─── MQTT ─────────────────────────────────────────────────────────────────────
mqtt:
  broker: 127.0.0.1
  port: 1883
  discovery: true      # auto-discovers Frigate switches + sensors
  binary_sensor: !include mqtt_sensors.yaml

# ─── Automations & Scripts ────────────────────────────────────────────────────
automation: !include automations.yaml
script: !include_dir_merge_named scripts
scene: !include scenes.yaml

# ─── Logging ──────────────────────────────────────────────────────────────────
logger:
  default: warning
  logs:
    homeassistant.components.mqtt: info
