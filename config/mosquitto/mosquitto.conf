# Mosquitto MQTT broker config — Custos
# Internal message bus between Frigate and Home Assistant.

# Bind only to localhost so LAN devices can't publish fake events.
# HA and Frigate both run with host networking so localhost:1883 is reachable.
listener 1883 127.0.0.1

# Require username/password authentication.
# Credentials are generated by scripts/setup.sh and stored in this file.
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type information
log_timestamp true
