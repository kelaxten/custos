# Mosquitto MQTT broker config — Custos
# Internal message bus between Frigate and Home Assistant.
# This broker is not exposed to the internet; it listens on the Docker network only.

listener 1883
allow_anonymous true          # safe: only reachable within Docker network + local LAN

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type information
log_timestamp true
